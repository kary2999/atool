<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<title>WS 检查器</title>
<style>
/* ── Reset ──────────────────────────────────────────────────────── */
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system,'Segoe UI',system-ui,sans-serif;
  font-size: 12px; background: #f0f0f0; color: #1a1a1a;
  display: flex; flex-direction: column; height: 100vh; overflow: hidden;
}

/* ── 工具栏（双行） ─────────────────────────────────────────────── */
#toolbar { display: flex; flex-direction: column; flex-shrink: 0; }
#toolbar-filter {
  display: flex; align-items: center; gap: 5px;
  padding: 5px 8px; background: #f0f0f0; border-bottom: 1px solid #ddd;
}
#toolbar-actions {
  display: flex; align-items: center; gap: 4px;
  padding: 3px 8px; background: #f8f8f8; border-bottom: 1px solid #ccc;
}
.btn {
  padding: 3px 9px; font-size: 11px; font-family: inherit;
  background: transparent; border: 1px solid #ccc; border-radius: 2px;
  color: #333; cursor: pointer; white-space: nowrap; transition: all .1s;
}
.btn:hover { background: #e0e0e0; }
.btn.danger { color: #c62828; border-color: #c62828; }
.btn.danger:hover { background: #ffebee; }
.btn.primary { background: #1a73e8; border-color: #1a73e8; color: #fff; }
.btn.primary:hover { background: #1557b0; }
.btn.warn { color: #e65100; border-color: #e65100; }
.btn.warn:hover { background: #fff3e0; }
.btn.on { background: #e8f0fe; border-color: #1a73e8; color: #1a73e8; }
.btn-group { display: flex; }
.btn-group .btn { border-radius: 0; border-right-width: 0; }
.btn-group .btn:first-child { border-radius: 2px 0 0 2px; }
.btn-group .btn:last-child  { border-radius: 0 2px 2px 0; border-right-width: 1px; }
#conn-select {
  font-size: 11px; font-family: inherit; border: 1px solid #ccc;
  border-radius: 2px; padding: 2px 5px; background: #fff; max-width: 200px;
}
#filter-input {
  flex: 1; min-width: 80px; font-size: 11px; font-family: inherit;
  border: 1px solid #ccc; border-radius: 2px; padding: 3px 7px; outline: none;
}
#filter-input:focus { border-color: #1a73e8; box-shadow: 0 0 0 2px rgba(26,115,232,.15); }
#msg-count { color: #666; font-size: 11px; white-space: nowrap; }
.sep { width: 1px; height: 16px; background: #ccc; margin: 0 2px; flex-shrink: 0; }

/* ── 侧栏提示条 ──────────────────────────────────────────────────── */
#sidepanel-bar {
  display: none; align-items: center; gap: 6px; flex-shrink: 0;
  padding: 4px 10px; background: #e8f0fe; border-bottom: 1px solid #c5d8f8;
  font-size: 11px; color: #1a73e8;
}
#sidepanel-bar.show { display: flex; }
#sidepanel-bar strong { font-weight: 700; }
#sidepanel-close {
  margin-left: auto; font-size: 10px; color: #1a73e8; cursor: pointer;
  text-decoration: underline; background: none; border: none; font-family: inherit;
}

/* ── 主布局 ─────────────────────────────────────────────────────── */
#main { display: flex; flex: 1; overflow: hidden; }

@media (max-width: 560px) {
  #main { flex-direction: column; }
  #left-panel { width: 100%; min-width: unset; border-right: none; border-bottom: 1px solid #ddd; max-height: 45vh; }
  #detail-panel { flex: 1; min-height: 0; }
}

/* ── 左栏 ───────────────────────────────────────────────────────── */
#left-panel {
  width: 44%; min-width: 200px; border-right: 1px solid #ddd;
  display: flex; flex-direction: column; overflow: hidden;
}
#left-tabs {
  display: flex; border-bottom: 1px solid #ddd; background: #f5f5f5; flex-shrink: 0;
}
.ltab {
  padding: 3px 12px; font-size: 11px; cursor: pointer; color: #555;
  border-bottom: 2px solid transparent; user-select: none; transition: color .1s;
}
.ltab:hover { color: #1a73e8; }
.ltab.on { color: #1a73e8; border-bottom-color: #1a73e8; background: #fff; font-weight: 600; }
.ltab .badge-cnt {
  display: inline-block; background: #e8f0fe; color: #1a73e8;
  font-size: 9px; border-radius: 8px; padding: 0 5px; margin-left: 4px; font-weight: 700;
}

/* ── 置顶区 ─────────────────────────────────────────────────────── */
#pin-section {
  flex-shrink: 0; border-bottom: 2px solid #e8a000;
  max-height: 130px; overflow-y: auto; background: #fffde7; display: none;
}
#pin-header {
  padding: 3px 8px; font-size: 10px; font-weight: 700; color: #795548;
  background: #fff9c4; border-bottom: 1px solid #f9e04b;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0;
}
#pin-header button { font-size: 10px; background: transparent; border: none; cursor: pointer; color: #888; padding: 0 4px; }
#pin-rows .msg-row { background: #fffde7; }
#pin-rows .msg-row:hover { background: #fff9c4; }

#list-header {
  display: flex; align-items: center; padding: 3px 8px;
  background: #f5f5f5; border-bottom: 1px solid #e0e0e0;
  font-size: 10px; color: #666; font-weight: 700; letter-spacing: .4px;
  flex-shrink: 0;
}
#msg-list { flex: 1; overflow-y: auto; background: #fff; }

/* ── 消息行 ─────────────────────────────────────────────────────── */
.msg-row {
  display: flex; align-items: center; gap: 4px;
  padding: 3px 8px; border-bottom: 1px solid #f0f0f0;
  cursor: pointer; min-height: 22px; position: relative; transition: background .08s;
}
.msg-row:hover { background: #e8f0fe; }
.msg-row:hover .row-acts { opacity: 1; }
.msg-row.selected { background: #1a73e8 !important; color: #fff !important; }
.msg-row.selected .ts, .msg-row.selected .sz { color: rgba(255,255,255,.75) !important; }
.msg-row.selected .badge { opacity: .85; }
.msg-row.selected .row-acts button { color: rgba(255,255,255,.8) !important; }
.msg-row.rule-hl { border-left: 3px solid var(--rl, #1a73e8); }
.msg-row.ev-open  { color: #2e7d32; font-style: italic; }
.msg-row.ev-close { color: #c62828; font-style: italic; }
.msg-row.ev-error { color: #c62828; font-style: italic; }
.msg-row.active-src { border-left: 2px solid #1a73e8; }
.msg-row.deleted { display: none; }

.dir { width: 14px; font-size: 13px; flex-shrink: 0; }
.dir.up { color: #1a73e8; } .dir.dn { color: #188038; }
.ts  { width: 80px; color: #888; font-size: 10px; flex-shrink: 0; font-family: 'Menlo',monospace; }
.prev { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 11px; }
.sz  { color: #888; font-size: 10px; flex-shrink: 0; }
.badge {
  font-size: 9px; padding: 1px 4px; border-radius: 2px; flex-shrink: 0; font-weight: 700; white-space: nowrap;
}
.badge.gz  { background: #e3f2fd; color: #1565c0; }
.badge.zl  { background: #f3e5f5; color: #7b1fa2; }
.badge.dfr { background: #fce4ec; color: #c62828; }
.badge.act { background: #e8f5e9; color: #2e7d32; }
.badge.ping{ background: #f3f3f3; color: #999; }

.row-acts { display: flex; gap: 1px; flex-shrink: 0; opacity: 0; transition: opacity .1s; }
.row-acts button {
  background: transparent; border: none; cursor: pointer;
  padding: 1px 3px; font-size: 11px; color: #555; border-radius: 2px;
}
.row-acts button:hover { background: rgba(0,0,0,.08); }
.pin-btn.pinned { color: #e8a000 !important; opacity: 1 !important; }

/* ── 连接管理 ───────────────────────────────────────────────────── */
#conn-tab-content { flex: 1; overflow-y: auto; background: #fff; }
.conn-card {
  padding: 10px 12px; border-bottom: 1px solid #f0f0f0; transition: background .08s;
}
.conn-card:hover { background: #fafafa; }
.conn-card-head { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
.conn-type-icon { font-size: 14px; flex-shrink: 0; }
.conn-url { flex: 1; font-size: 11px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.status-dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
}
.status-dot.open        { background: #2e7d32; box-shadow: 0 0 0 2px #c8e6c9; }
.status-dot.closed      { background: #bbb; }
.status-dot.connecting  { background: #f9a825; animation: pulse .8s infinite; }
.status-dot.reconnecting{ background: #e65100; animation: pulse .6s infinite; }
.status-dot.error       { background: #c62828; }
.status-dot.intercepted { background: #1a73e8; box-shadow: 0 0 0 2px #bbdefb; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
.conn-meta { font-size: 10px; color: #888; display: flex; gap: 10px; flex-wrap: wrap; }
.conn-meta span b { color: #333; }
.conn-actions { margin-top: 7px; display: flex; gap: 5px; flex-wrap: wrap; align-items: center; }
.conn-actions .btn { padding: 2px 8px; font-size: 10px; }
.hb-row { display: flex; align-items: center; gap: 5px; font-size: 10px; color: #555; margin-top: 6px; }
.hb-row input[type=number] { width: 48px; font-size: 10px; border: 1px solid #ccc; border-radius: 2px; padding: 1px 4px; text-align: center; }
.hb-row input[type=text]   { flex: 1; font-size: 10px; border: 1px solid #ccc; border-radius: 2px; padding: 1px 5px; font-family: 'Menlo',monospace; }
.hb-row label { white-space: nowrap; }

/* ── 右侧详情 ───────────────────────────────────────────────────── */
#detail-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: #fff; }
#detail-tabs  { display: flex; border-bottom: 1px solid #ddd; background: #f5f5f5; flex-shrink: 0; align-items: center; }
.dtab {
  padding: 5px 14px; font-size: 11px; cursor: pointer; color: #555;
  border-bottom: 2px solid transparent; transition: color .1s; user-select: none;
}
.dtab:hover { color: #1a73e8; }
.dtab.on { color: #1a73e8; border-bottom-color: #1a73e8; background: #fff; }
#copy-btn {
  margin-left: auto; margin-right: 6px; font-size: 10px;
  padding: 2px 8px; border: 1px solid #ccc; border-radius: 2px;
  background: transparent; cursor: pointer; color: #555;
}
#copy-btn:hover { background: #e0e0e0; }

#detail-content { flex: 1; overflow: auto; padding: 10px; }
#detail-content pre {
  font-family: 'Menlo',monospace; font-size: 11px; line-height: 1.6;
  white-space: pre-wrap; word-break: break-all;
}
.hint { padding: 20px; text-align: center; color: #aaa; font-style: italic; }

/* ── 发送栏 ─────────────────────────────────────────────────────── */
#send-bar {
  border-top: 1px solid #ddd; padding: 6px 8px; flex-shrink: 0;
  background: #fafafa; display: none; flex-direction: column; gap: 5px;
}
#send-bar.visible { display: flex; }
#send-target-info { font-size: 10px; display: flex; align-items: center; gap: 6px; }
#send-target-info .target-url { color: #1a73e8; font-weight: 600; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
#send-target-info .status-dot { width: 7px; height: 7px; }

#tpl-bar { display: flex; align-items: center; gap: 5px; }
#tpl-bar label { font-size: 10px; color: #888; flex-shrink: 0; }
#tpl-select { font-size: 11px; font-family: inherit; border: 1px solid #ccc; border-radius: 2px; padding: 2px 5px; flex: 1; max-width: 200px; }
#save-tpl-btn { font-size: 10px; padding: 2px 7px; border: 1px solid #ccc; border-radius: 2px; background: transparent; cursor: pointer; color: #555; }
#save-tpl-btn:hover { background: #e0e0e0; }

#send-input {
  width: 100%; height: 56px; resize: vertical;
  font-family: 'Menlo',monospace; font-size: 11px;
  border: 1px solid #ccc; border-radius: 2px; padding: 5px 7px; outline: none; line-height: 1.5;
}
#send-input:focus { border-color: #1a73e8; }
#send-row { display: flex; gap: 5px; align-items: center; }
#send-fmt { font-size: 11px; font-family: inherit; border: 1px solid #ccc; border-radius: 2px; padding: 2px 5px; }
#send-btn { margin-left: auto; }
#send-input:disabled, #send-btn:disabled { opacity: .5; cursor: not-allowed; }

/* ── JSON 高亮 ──────────────────────────────────────────────────── */
.jk{color:#1a73e8} .js{color:#188038} .jn{color:#c62828} .jb{color:#8000d7}

/* ── 右键菜单 ───────────────────────────────────────────────────── */
#ctx-menu {
  position: fixed; z-index: 9999; background: #fff; border: 1px solid #ccc;
  border-radius: 4px; box-shadow: 0 4px 12px rgba(0,0,0,.15); min-width: 150px;
  padding: 4px 0; display: none; font-size: 12px;
}
#ctx-menu.open { display: block; }
.ctx-item {
  padding: 5px 14px; cursor: pointer; display: flex; align-items: center; gap: 8px;
}
.ctx-item:hover { background: #e8f0fe; color: #1a73e8; }
.ctx-item.danger:hover { background: #ffebee; color: #c62828; }
.ctx-sep { height: 1px; background: #eee; margin: 3px 0; }

/* ── 模态框 ─────────────────────────────────────────────────────── */
.modal-mask {
  position: fixed; inset: 0; background: rgba(0,0,0,.35); z-index: 1000;
  display: none; align-items: flex-start; justify-content: center; padding-top: 40px;
}
.modal-mask.open { display: flex; }
.modal-box {
  background: #fff; border-radius: 6px; box-shadow: 0 8px 32px rgba(0,0,0,.2);
  width: 520px; max-width: 96vw; max-height: 82vh;
  display: flex; flex-direction: column; overflow: hidden;
}
.modal-head {
  padding: 12px 16px; border-bottom: 1px solid #eee; font-weight: 700; font-size: 13px;
  display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
}
.modal-head button { background: transparent; border: none; font-size: 16px; cursor: pointer; color: #888; }
.modal-body { padding: 14px 16px; overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 10px; }
.modal-foot { padding: 10px 16px; border-top: 1px solid #eee; display: flex; justify-content: flex-end; gap: 8px; flex-shrink: 0; }
.form-row { display: flex; flex-direction: column; gap: 4px; }
.form-row label { font-size: 11px; color: #555; font-weight: 600; }
.form-row input,.form-row textarea,.form-row select {
  font-size: 12px; font-family: inherit; border: 1px solid #ccc; border-radius: 3px;
  padding: 5px 8px; outline: none; width: 100%;
}
.form-row input:focus,.form-row textarea:focus { border-color: #1a73e8; }
.form-row textarea { font-family: 'Menlo',monospace; resize: vertical; height: 72px; }
.form-note { font-size: 10px; color: #999; margin-top: 2px; }
.form-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.form-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }

#rule-list { display: flex; flex-direction: column; gap: 5px; }
.rule-item {
  display: flex; align-items: center; gap: 7px; padding: 7px 10px;
  border: 1px solid #e0e0e0; border-radius: 4px; background: #fafafa;
  transition: opacity .15s;
}
.rule-item.disabled { opacity: .45; }
.rule-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.rule-item-name  { font-weight: 600; font-size: 12px; flex: 0 0 90px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.rule-item-match { font-size: 10px; color: #888; flex: 1; font-family: 'Menlo',monospace; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.rule-toggle { cursor: pointer; flex-shrink: 0; }
.rule-del { background: transparent; border: none; cursor: pointer; color: #ccc; font-size: 14px; padding: 0 2px; flex-shrink: 0; }
.rule-del:hover { color: #c62828; }

#tpl-list { display: flex; flex-direction: column; gap: 5px; }
.tpl-item {
  display: flex; align-items: center; gap: 7px; padding: 7px 10px;
  border: 1px solid #e0e0e0; border-radius: 4px; cursor: pointer; transition: background .08s;
}
.tpl-item:hover { background: #e8f0fe; }
.tpl-item-name { font-weight: 600; font-size: 12px; flex: 0 0 100px; }
.tpl-item-prev { font-size: 10px; color: #888; flex: 1; font-family: 'Menlo',monospace; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.tpl-del { background: transparent; border: none; cursor: pointer; color: #ccc; font-size: 14px; flex-shrink: 0; }
.tpl-del:hover { color: #c62828; }

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #aaa; }
</style>
</head>
<body>

<!-- 侧栏模式提示条 -->
<div id="sidepanel-bar">
  <strong>侧栏模式</strong> — 自动跟随当前标签页抓包，切换标签页时数据自动清空
  <button id="sidepanel-close">关闭提示</button>
</div>

<!-- ═══════ 工具栏 ═══════════════════════════════════════════════ -->
<div id="toolbar">
  <div id="toolbar-filter">
    <button class="btn danger" id="clear-btn">清空</button>
    <button class="btn" id="pause-btn">⏸ 暂停</button>
    <div class="sep"></div>
    <select id="conn-select">
      <option value="">全部连接</option>
    </select>
    <div class="btn-group">
      <button class="btn on" id="dir-all">全部</button>
      <button class="btn"    id="dir-recv">↓ 收</button>
      <button class="btn"    id="dir-send">↑ 发</button>
    </div>
    <input id="filter-input" type="text" placeholder="过滤消息…">
    <span id="msg-count">0 条</span>
  </div>
  <div id="toolbar-actions">
    <button class="btn primary" id="new-conn-btn">＋ 新建连接</button>
    <button class="btn" id="rules-btn">⚙ 订阅规则</button>
    <button class="btn" id="tpl-modal-btn">📋 模板</button>
    <button class="btn" id="export-btn">⬇ 导出</button>
    <div style="flex:1"></div>
    <button class="btn" id="demo-btn" style="color:#888;border-color:#ddd">示例数据</button>
  </div>
</div>

<!-- ═══════ 主体 ═════════════════════════════════════════════════ -->
<div id="main">
  <div id="left-panel">
    <div id="left-tabs">
      <div class="ltab on" id="ltab-msg">消息<span class="badge-cnt" id="tab-msg-cnt">0</span></div>
      <div class="ltab"    id="ltab-conn">连接<span class="badge-cnt" id="tab-conn-cnt">0</span></div>
    </div>

    <div id="msg-tab-pane" style="display:flex;flex-direction:column;flex:1;overflow:hidden">
      <div id="pin-section">
        <div id="pin-header">
          <span>📌 置顶</span>
          <button id="clear-pins-btn">全部清除</button>
        </div>
        <div id="pin-rows"></div>
      </div>
      <div id="list-header">
        <span style="width:14px"></span>
        <span style="width:80px">时间</span>
        <span style="flex:1">内容</span>
        <span style="width:36px">大小</span>
        <span style="width:46px"></span>
      </div>
      <div id="msg-list"></div>
    </div>

    <div id="conn-tab-content" style="display:none"></div>
  </div>

  <div id="detail-panel">
    <div id="detail-tabs">
      <div class="dtab on" id="dtab-decoded">解码</div>
      <div class="dtab"    id="dtab-raw">原始</div>
      <div class="dtab"    id="dtab-hex">十六进制</div>
      <div class="dtab"    id="dtab-info">信息</div>
      <button id="copy-btn">📋 复制</button>
    </div>
    <div id="detail-content"><p class="hint">选择一条消息查看详情</p></div>

    <div id="send-bar">
      <div id="send-target-info">
        <div class="status-dot" id="send-status-dot"></div>
        <span class="target-url" id="send-target-url">—</span>
        <button id="disconnect-active-btn" style="font-size:10px;padding:1px 6px;border:1px solid #ccc;border-radius:2px;background:transparent;cursor:pointer;color:#c62828">断开</button>
      </div>
      <div id="tpl-bar">
        <label>模板：</label>
        <select id="tpl-select"><option value="">— 选择模板 —</option></select>
        <button id="save-tpl-btn">另存为模板</button>
      </div>
      <textarea id="send-input" placeholder='{"type":"ping"}'></textarea>
      <div id="send-row">
        <select id="send-fmt">
          <option value="text">文本</option>
          <option value="json">JSON（验证）</option>
        </select>
        <button class="btn primary" id="send-btn">发送 ↑</button>
      </div>
    </div>
  </div>
</div>

<!-- 右键菜单 -->
<div id="ctx-menu">
  <div class="ctx-item" data-ctx="copy-decoded">📄 复制解码内容</div>
  <div class="ctx-item" data-ctx="copy-raw">📋 复制原始内容</div>
  <div class="ctx-sep"></div>
  <div class="ctx-item" data-ctx="pin">📌 置顶 / 取消置顶</div>
  <div class="ctx-item" data-ctx="resend">↑ 重发（主动连接）</div>
  <div class="ctx-sep"></div>
  <div class="ctx-item danger" data-ctx="delete">🗑 删除此消息</div>
</div>

<!-- 新建连接 Modal -->
<div class="modal-mask" id="modal-conn">
  <div class="modal-box">
    <div class="modal-head">🔌 新建 WebSocket 连接 <button data-close="modal-conn">✕</button></div>
    <div class="modal-body">
      <div class="form-row">
        <label>WebSocket 地址 <span style="color:#c62828">*</span></label>
        <input id="new-url" type="text" placeholder="wss://example.com/ws">
      </div>
      <div class="form-row">
        <label>连接成功后自动发送</label>
        <textarea id="new-auto-send" placeholder='{"type":"subscribe","channel":"prices"}'></textarea>
        <span class="form-note">留空则不发。发多条用 JSON 数组 [{…},{…}]</span>
      </div>
      <div class="form-row">
        <label>绑定订阅规则（可选）</label>
        <select id="new-rule-select"><option value="">— 不绑定 —</option></select>
      </div>
      <div style="border:1px solid #e0e0e0;border-radius:4px;padding:10px;background:#fafafa">
        <div style="font-size:11px;font-weight:700;color:#555;margin-bottom:8px">心跳配置</div>
        <div class="form-grid-3">
          <div class="form-row"><label>启用心跳</label>
            <select id="new-hb-enable"><option value="0">禁用</option><option value="1">启用</option></select>
          </div>
          <div class="form-row"><label>间隔（秒）</label>
            <input id="new-hb-interval" type="number" value="30" min="1" max="300">
          </div>
          <div class="form-row"><label>报文</label>
            <input id="new-hb-msg" type="text" value='{"type":"ping"}' style="font-family:'Menlo',monospace">
          </div>
        </div>
      </div>
      <div style="border:1px solid #e0e0e0;border-radius:4px;padding:10px;background:#fafafa">
        <div style="font-size:11px;font-weight:700;color:#555;margin-bottom:8px">自动重连</div>
        <div class="form-grid-2">
          <div class="form-row"><label>启用自动重连</label>
            <select id="new-rc-enable"><option value="1">启用</option><option value="0">禁用</option></select>
          </div>
          <div class="form-row"><label>最大重连次数</label>
            <input id="new-rc-max" type="number" value="5" min="1" max="20">
          </div>
        </div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn" data-close="modal-conn">取消</button>
      <button class="btn primary" id="do-connect-btn">连接</button>
    </div>
  </div>
</div>

<!-- 订阅规则 Modal -->
<div class="modal-mask" id="modal-rules">
  <div class="modal-box" style="width:580px">
    <div class="modal-head">⚙ 订阅规则 <button data-close="modal-rules">✕</button></div>
    <div class="modal-body">
      <div id="rule-list"></div>
      <details style="margin-top:6px">
        <summary style="cursor:pointer;font-size:12px;color:#1a73e8;user-select:none">＋ 添加规则</summary>
        <div style="margin-top:8px;padding:10px;border:1px solid #e0e0e0;border-radius:4px;background:#fafafa;display:flex;flex-direction:column;gap:8px">
          <div class="form-grid-2">
            <div class="form-row"><label>规则名称</label><input id="r-name" type="text" placeholder="价格推送"></div>
            <div class="form-row"><label>高亮颜色</label><input id="r-color" type="color" value="#ff6d00" style="height:32px;padding:2px 4px"></div>
          </div>
          <div class="form-grid-2">
            <div class="form-row"><label>匹配方式</label>
              <select id="r-match-type">
                <option value="keyword">关键词</option>
                <option value="regex">正则表达式</option>
                <option value="jsonpath">JSON 字段</option>
              </select>
            </div>
            <div class="form-row"><label>匹配值</label><input id="r-match-val" type="text" placeholder="price_update"></div>
          </div>
          <div class="form-row">
            <label>连接成功后自动发送</label>
            <textarea id="r-auto-send" style="height:56px" placeholder='{"type":"subscribe","channel":"prices"}'></textarea>
          </div>
          <button class="btn primary" id="add-rule-btn" style="align-self:flex-end">添加规则</button>
        </div>
      </details>
    </div>
    <div class="modal-foot"><button class="btn primary" data-close="modal-rules">完成</button></div>
  </div>
</div>

<!-- 发送模板 Modal -->
<div class="modal-mask" id="modal-tpl">
  <div class="modal-box" style="width:500px">
    <div class="modal-head">📋 发送模板 <button data-close="modal-tpl">✕</button></div>
    <div class="modal-body">
      <div id="tpl-list"></div>
      <details style="margin-top:6px">
        <summary style="cursor:pointer;font-size:12px;color:#1a73e8;user-select:none">＋ 新建模板</summary>
        <div style="margin-top:8px;padding:10px;border:1px solid #e0e0e0;border-radius:4px;background:#fafafa;display:flex;flex-direction:column;gap:8px">
          <div class="form-row"><label>模板名称</label><input id="tpl-name" type="text" placeholder="订阅价格"></div>
          <div class="form-row"><label>内容</label><textarea id="tpl-content" placeholder='{"type":"subscribe","channel":"prices"}'></textarea></div>
          <button class="btn primary" id="add-tpl-btn" style="align-self:flex-end">保存模板</button>
        </div>
      </details>
    </div>
    <div class="modal-foot"><button class="btn primary" data-close="modal-tpl">完成</button></div>
  </div>
</div>

<!-- 保存模板命名 Modal -->
<div class="modal-mask" id="modal-save-tpl">
  <div class="modal-box" style="width:360px">
    <div class="modal-head">另存为模板 <button data-close="modal-save-tpl">✕</button></div>
    <div class="modal-body">
      <div class="form-row"><label>模板名称</label><input id="save-tpl-name" type="text" placeholder="订阅报文"></div>
    </div>
    <div class="modal-foot">
      <button class="btn" data-close="modal-save-tpl">取消</button>
      <button class="btn primary" id="do-save-tpl-btn">保存</button>
    </div>
  </div>
</div>

<script src="decompress.js"></script>
<script src="panel.js"></script>
</body>
</html>
